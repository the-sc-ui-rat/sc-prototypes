<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Expo Go — SC Prototype</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #e9edf6; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: white; border-radius: 20px; padding: 40px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
    h1 { font-size: 20px; color: #1f2533; margin: 0 0 4px; }
    p { color: #545f70; font-size: 14px; margin: 0 0 24px; }
    #qr { margin: 0 auto 20px; }
    code { font-size: 12px; color: #6559ff; background: #f0efff; padding: 6px 12px; border-radius: 6px; display: block; margin-top: 16px; word-break: break-all; }
    .dot { width: 10px; height: 10px; border-radius: 5px; background: #22c55e; display: inline-block; margin-right: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>SC Oloid Prototype</h1>
    <p><span class="dot"></span>Tunnel live — scan with Expo Go</p>
    <div id="qr"></div>
    <code id="url">exp://xycjcpe-theuirat-8081.exp.direct</code>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script>
    const url = 'exp://xycjcpe-theuirat-8081.exp.direct';
    QRCode.toCanvas(document.createElement('canvas'), url, { width: 240, margin: 2 }, function(err, canvas) {
      if (!err) document.getElementById('qr').appendChild(canvas);
    });
  </script>
</body>
</html>
